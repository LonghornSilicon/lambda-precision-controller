# LibreLane Classic-flow hardening config for the precision_controller macro.
#
# STATUS: REAL RTL (per-tile INT8-vs-FP16 decision, no-division gate) — signed
# off on Sky130 in adaptive-precision-attention/openlane/precision_controller.
# Re-targeted to GF180MCU here. Ported from that repo's config.json.
#
# Provenance: ../rtl/blocks/PROVENANCE.md

meta:
  version: 3
  flow: Classic

DESIGN_NAME: precision_controller

PDK: gf180mcuD

VERILOG_FILES:
  - dir::../../../rtl/precision_controller.sv

CLOCK_PORT: clk
CLOCK_NET: clk
CLOCK_PERIOD: 40     # ns — GF180 retime (loose start)

FP_SIZING: relative
FP_CORE_UTIL: 50
PL_TARGET_DENSITY_PCT: 60

DESIGN_IS_CORE: false
IO_DELAY_CONSTRAINT: 5
CLOCK_UNCERTAINTY_CONSTRAINT: 0.1
GRT_ALLOW_CONGESTION: true
